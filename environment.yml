name: data-curation
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  - pinocchio          # FK support — conda-forge only, not available via pip
  - numpy
  - pandas
  - pyarrow
  - matplotlib
  - scipy
  - pyyaml
  - pip
  - pip:
    - huggingface_hub
    - ruptures
    - fast-ticc>=1.0.1  # Recurring primitive discovery (TICC)
    - sktime>=0.40.1    # sktime segmentation benchmark
    - scikit-learn      # silhouette_score for TICC auto-k
    - pytest            # testing
    - -e .              # Install the data-curation package itself in editable mode
