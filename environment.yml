name: data-curation
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  - pinocchio          # FK support — conda-forge only, not available via pip
  - numpy
  - pandas
  - pyarrow
  - matplotlib
  - scipy
  - pyyaml
  - pip
  - pip:
    - huggingface_hub
    - ruptures
    - -e .             # Install the data-curation package itself in editable mode
