# Pipeline configuration for run_lerobot_segmentation.py
# All hyperparameters are either inferred from data (marked "null → inferred")
# or documented with the rationale for why they must be configurable.

# ---------------------------------------------------------------------------
# Dataset / sampling
# ---------------------------------------------------------------------------
dataset:
  n_episodes: 5        # how many episodes to process (0 = schema-only)
  seed: 42             # reproducibility
  local: true          # true = dataset_path is a local directory
  missing_values: ffill_drop  # ffill_drop | none

# ---------------------------------------------------------------------------
# Feature construction
# ---------------------------------------------------------------------------
features:
  # dt: null → inferred as median(np.diff(timestamps)) from each episode.
  # Set to a float (e.g. 0.033) to force a fixed sampling rate.
  dt: null

  smoothing: savgol    # savgol | lowpass | none
  normalize: mad       # mad | iqr | none

  # Modalities to run segmentation on.
  # "joint"         → joint position/velocity/acceleration
  # "cartesian" → EE position + orientation (requires FK or ee_pose in dataset)
  # "joint_command" → joint position/velocity/acceleration + command + command error
  # "ablation"      → deprecated alias of joint_command
  modalities:
    - joint
    - cartesian        # will be skipped if no URDF and no ee_pose in dataset

  # Modality weights applied after normalisation (1.0 = no scaling)
  modality_weights:
    joint: 1.0
    cartesian: 1.0
    command: 1.0

  # Joint-specific weights to emphasize certain joints in segmentation
  # Higher weights will make the rupture algorithm more sensitive to changes in those joints
  joint_weights:
    # Emphasize right hand joints for segmentation
    right_hand_finger_joint_1: 2.0
    right_hand_finger_joint_2: 2000.0
    right_hand_finger_joint_3: 2.0
    right_hand_finger_joint_4: 2.0
    right_hand_finger_joint_5: 2.0
    right_hand_finger_joint_6: 2.0
    right_hand_finger_joint_7: 2.0
    right_hand_finger_joint_8: 2.0
    right_hand_finger_joint_9: 2.0
    right_hand_finger_joint_10: 2.0
    right_hand_finger_joint_11: 2.0
    right_hand_finger_joint_12: 2.0
    # Can also emphasize the right arm
    right_arm_joint_1: 1.5
    right_arm_joint_2: 1.5
    right_arm_joint_3: 1.5
    right_arm_joint_4: 1.5
    right_arm_joint_5: 1.5
    right_arm_joint_6: 1.5
    right_arm_joint_7: 1.5

  # Joint grouping configuration for RB-Y1 robot
  # When specified, joints are processed in groups rather than as a single block
  joint_groups:
    torso:
      - torso_0
      - torso_1
      - torso_2
      - torso_3
      - torso_4
      - torso_5
    right_arm:
      - right_arm_0
      - right_arm_1
      - right_arm_2
      - right_arm_3
      - right_arm_4
      - right_arm_5
      - right_arm_6
    left_arm:
      - left_arm_0
      - left_arm_1
      - left_arm_2
      - left_arm_3
      - left_arm_4
      - left_arm_5
      - left_arm_6
    right_gripper:
      - gripper_finger_r1
      - gripper_finger_r2
    left_gripper:
      - gripper_finger_l1
      - gripper_finger_l2

# ---------------------------------------------------------------------------
# Ruptures change-point detection
# ---------------------------------------------------------------------------
ruptures:
  model: rbf           # rbf | l2 | l1 | cosine
  min_size: 5          # minimum segment length in frames
  jump: 1              # sub-sampling step (1 = exact, higher = faster)

  # penalty: "auto" → elbow-based auto-selection from penalty_range.
  # Set to a float to use a fixed penalty (disables auto-selection).
  penalty: auto
  auto_method: elbow   # elbow is the only implemented method

  # Log-spaced search range for auto penalty selection.
  # Wider range → more candidates → slower but more robust.
  # Rationale: these cover typical ruptures RBF penalty scales.
  penalty_range: [0.5, 200.0]
  n_penalty_steps: 40

  # Comparison algorithm (runs in addition to PELT for benchmarking)
  compare_algorithm: binseg
  max_n_bkps: 30       # cap for binseg when using predicted n_bkps

# ---------------------------------------------------------------------------
# fast_ticc primitive discovery
# ---------------------------------------------------------------------------
ticc:
  # Enable/disable TICC processing (set to false to skip TICC entirely)
  enabled: true
  
  window_size: 10      # frames per TICC window; should match segment granularity

  # n_clusters: "auto" → silhouette search over 2..max_k
  # Set to an integer to use a fixed number of clusters.
  n_clusters: 3
  max_k: 10            # upper bound for auto search

  # Sparsity regularisation: higher → sparser inverse covariance graphs.
  # Rationale: 0.11 is the fast_ticc default; adjust if segments are over-split.
  lambda_: 0.11

  # Temporal coherence weight: higher → smoother cluster assignments.
  # Rationale: 400 is the fast_ticc default for robot tasks.
  beta: 400.0

  max_iter: 50
  random_state: 42

# ---------------------------------------------------------------------------
# sktime benchmarking
# ---------------------------------------------------------------------------
sktime:
  # Enable/disable sktime processing (set to false to skip sktime entirely)
  enabled: true

# ---------------------------------------------------------------------------
# Evaluation
# ---------------------------------------------------------------------------
evaluation:
  # Two boundaries within this many frames are considered "in agreement".
  # Rationale: at 30 Hz, 5 frames ≈ 167 ms — typical human annotation jitter.
  boundary_tolerance_frames: 5

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output:
  plots: true
  csv: true
  json: true
  report: true
